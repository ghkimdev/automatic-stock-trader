services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  api:
    build: .
    env_file:
      - config/settings.example.env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
volumes:
  postgres-data:
